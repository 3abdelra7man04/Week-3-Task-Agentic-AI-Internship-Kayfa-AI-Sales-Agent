services:
  mongodb:
    image: mongo:7-jammy

    container_name: mongodb

    ports:
      - "27007:27017"

    volumes:
      - ./mongodb:/data/db

    networks:
      - backend

    restart: always

  # Qdrant (VectorDB)
  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    networks:
      - backend
    restart: always

networks:
  backend:
